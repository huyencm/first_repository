 <body>
 <header>
 <h1>情報登録</h1>
 <p>あなたの情報を詳細に把握するフォームです</p>
 </header>
 <main>
 
 <section id=history>
 <h2><span>2</span>経歴とルーツ</h2>
 <div class=grid>
 <div class="grid two">
 <div>
 <label>最終学歴</label>
 <select>
                <option selected>選択してください</option>
                <option>高校卒業</option>
                <option>専門/短大卒</option>
                <option>大学卒</option>
                <option>大学院卒</option>
                <option>その他</option>
              </select>
 </div>
 <div>
 <label>専攻分野</label>
 <input type=text placeholder="情報科学 / 経営学 など" value>
 </div>
 </div>
 <div>
 <label>在学中の活動・研究</label>
 <textarea placeholder=研究テーマ、部活、プロジェクトなどを詳しく></textarea>
 </div>
 <div class="grid two">
 <div>
 <label>現在の勤務先</label>
 <input type=text placeholder=会社名 value>
 </div>
 <div>
 <label>役職 / 担当</label>
 <input type=text placeholder=職種やタイトル value>
 </div>
 </div>
 <div>
 <label>職務経歴ハイライト</label>
 <textarea placeholder=携わったプロジェクト、成果、挑戦したことなど></textarea>
 </div>
 <div class="grid two">
 <div>
 <label>勤務開始日</label>
 <input type=date value>
 </div>
 <div>
 <label>勤務時間帯</label>
 <input type=time value>
 </div>
 </div>
 <div>
 <label>過去の所在地遍歴</label>
 <textarea placeholder=幼少期〜現在まで居住した場所を年代順に></textarea>
 </div>
 <div>
 <label>仕事満足度</label>
 <div class=radio-group>
 <label class=radio-option><input type=radio name=job_satisfaction value="不満">不満</label>
 <label class=radio-option><input type=radio name=job_satisfaction value="まあまあ">まあまあ</label>
 <label class=radio-option><input type=radio name=job_satisfaction value="満足">満足</label>
 <label class=radio-option><input type=radio name=job_satisfaction value="すごく満足">すごく満足</label>
 </div>
 </div>
 </div>
 </section>
 <section id=family>
 
 
 </section>
 
 
 <div class=huge-spacer></div>
 </main>
